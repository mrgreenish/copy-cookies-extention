<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Copy Cookies</h1>

    <div class="clipboard-info" id="clipboard-info">
      No cookies copied yet
    </div>

    <div class="actions">
      <button id="copy-btn" class="btn btn-copy">
        Copy Cookies
      </button>
      <button id="paste-btn" class="btn btn-paste" disabled>
        Paste Cookies
      </button>
      <button id="export-btn" class="btn btn-export" disabled>
        Export for Playwright
      </button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
